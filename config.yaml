# ============================================================
# NLP Customer Feedback Analyzer — Configuration
# ============================================================

project:
  name: "Customer Feedback Analyzer"
  version: "1.0.0"

# --- Data Generation / Ingestion ---
data:
  n_reviews: 10000
  random_seed: 42
  raw_path: "data/raw_reviews.csv"
  processed_path: "data/processed_reviews.csv"
  categories:
    - "Electronics"
    - "Clothing"
    - "Home & Kitchen"
    - "Health & Beauty"
    - "Sports & Outdoors"
    - "Books"
    - "Grocery"
    - "Automotive"

# --- Text Preprocessing ---
preprocessing:
  lowercase: true
  remove_html: true
  remove_urls: true
  remove_special_chars: true
  remove_numbers: false
  min_token_length: 2
  max_doc_length: 512
  language: "english"

# --- VADER Sentiment Analysis ---
sentiment:
  compound_threshold_pos: 0.05
  compound_threshold_neg: -0.05
  sentence_level: true          # analyze per-sentence for mixed sentiment
  output_path: "outputs/sentiment_results.csv"

# --- BERTopic Configuration ---
topic_model:
  # Embedding model (sentence-transformers)
  embedding_model: "all-MiniLM-L6-v2"
  
  # UMAP dimensionality reduction
  umap:
    n_neighbors: 15
    n_components: 5
    min_dist: 0.0
    metric: "cosine"
    random_state: 42

  # HDBSCAN clustering
  hdbscan:
    min_cluster_size: 50
    min_samples: 10
    metric: "euclidean"
    cluster_selection_method: "eom"

  # c-TF-IDF representation
  vectorizer:
    stop_words: "english"
    n_gram_range: [1, 3]
    min_df: 5
    max_df: 0.95
  
  # Topic tuning
  nr_topics: "auto"
  top_n_words: 10
  calculate_probabilities: true
  
  output_path: "outputs/topic_results.csv"
  model_path: "outputs/bertopic_model"

# --- Pain Point Extraction ---
pain_points:
  # Focus on negative sentiment for actionable insights
  sentiment_filter: "negative"
  min_cluster_size: 20
  top_n_pain_points: 10
  output_path: "outputs/pain_points.json"

# --- Visualization & Dashboard ---
dashboard:
  host: "127.0.0.1"
  port: 5000
  debug: false
  plots_dir: "outputs/plots"

# --- Logging ---
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
  file: "outputs/pipeline.log"
